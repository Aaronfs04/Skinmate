<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account – Skincare</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page-wrapper">
      <div class="card">
        <!-- LEFT PANEL -->
        <div class="left-panel">
          <img class="logo" src="Images/logo_dobel.png" alt="Logo" />
          <div class="left-copy">
            <h1>Find Your Acne and Skin Type here</h1>
            <p>Customized. Confident. Clear.</p>
          </div>
          <img
            class="hero-img"
            src="images/Background_percobaan.png"
            alt="Skincare products"
          />
        </div>

        <!-- RIGHT PANEL -->
        <div class="right-panel">
          <h2>Create Account</h2>

          <div class="social-row">
            <button class="btn-social">
              <img src="Images/" alt="Google" />
              Sign up with Google
            </button>
            <button class="btn-social">
              <img src="Images/" alt="Facebook" />
              Sign up with Facebook
            </button>
          </div>

          <div class="divider">— OR —</div>

          <div class="field">
            <input type="email" id="email" placeholder="Email" />
          </div>

          <div class="field">
            <input type="password" id="password" placeholder="Password" />
            <button
              class="toggle-pw"
              onclick="togglePw()"
              aria-label="Toggle password"
            >
              <svg
                id="eye-icon"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="1.8"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"
                />
              </svg>
            </button>
          </div>

          <button class="btn-create">Create Account</button>

          <div class="bottom-links">
            Already have an account? <a href="#">Log in</a>
            <span class="guest">Enter as guest</span>
          </div>
        </div>
      </div>
    </div>

    <script>
      function togglePw() {
        const inp = document.getElementById("password");
        const icon = document.getElementById("eye-icon");
        if (inp.type === "password") {
          inp.type = "text";
          icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />`;
        } else {
          inp.type = "password";
          icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />`;
        }
      }
    </script>
  </body>
</html>
